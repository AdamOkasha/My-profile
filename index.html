<!DOCTYPE html>
<html lang="en">
<head>

    <title>Bootstrap Button Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { padding: 50px; }
        .demo-section { margin-bottom: 30px; border-bottom: 1px solid #ddd; padding-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bootstrap Button Styles</h1>
        <p class="lead">Bootstrap uses pre-defined classes to style elements instantly.</p>

        <div class="demo-section">
            <h3>Solid Colors</h3>
            <button type="button" class="btn btn-success btn-md">Primary</button>
            <button type="button" class="btn btn-secondary">Secondary</button>
            <button type="button" class="btn btn-success">Success</button>
            <button type="button" class="btn btn-danger">Danger</button>
            <button type="button" class="btn btn-warning">Warning</button>
            <button type="button" class="btn btn-info">Info</button>
            <button type="button" class="btn btn-light">Light</button>
            <button type="button" class="btn btn-dark">Dark</button>
            <button type="button" class="btn btn-link">Link</button>
        </div>

        <div class="demo-section">
            <h3>Outline Styles</h3>
            <button type="button" class="btn btn-outline-primary btn-lg">Primary</button>
            <button type="button" class="btn btn-outline-success">Success</button>
            <button type="button" class="btn btn-outline-danger">Danger</button>
        </div>

        <div class="demo-section">
            <h3>Sizes</h3>            
            <button type="button" class="btn btn-primary btn-lg">Large Button</button>
            <button type="button" class="btn btn-primary">Default Button</button>
            <button type="button" class="btn btn-primary btn-sm">Small Button</button>
        </div>
    </div>

</body>
</html>
